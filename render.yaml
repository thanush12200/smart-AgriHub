services:
  # Python ML Service
  - type: web
    name: agri-ml-api
    runtime: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt && python -c "from app.model_loader import ModelStore; ModelStore('models').load()"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

  # Node.js Backend Service
  - type: web
    name: agri-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: agri-ml-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEATHER_API_KEY
        sync: false
      - key: WEATHER_API_BASE
        value: https://api.openweathermap.org/data/2.5
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_CHAT_FALLBACK_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
